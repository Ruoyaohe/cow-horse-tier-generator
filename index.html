
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>牛马等级生成器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #DBEAFF;
            color: #1e293b;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden; /* 禁止全局滚动 */
        }
        /* 隐藏输入框的上下调节箭头 */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type=number] {
            -moz-appearance: textfield;
        }
        .gradient-gold {
            background: linear-gradient(45deg, #FFD700, #FFC870, #B8860B);
            box-shadow: 0 4px 15px rgba(255, 200, 112, 0.4);
        }
        .gradient-silver {
            background: linear-gradient(45deg, #BDC3C7, #87BDFF, #7F8C8D);
            box-shadow: 0 4px 15px rgba(135, 189, 255, 0.4);
        }
        .gradient-bronze {
            background: linear-gradient(45deg, #CD7F32, #D2691E, #8B4513);
            box-shadow: 0 4px 15px rgba(205, 127, 50, 0.4);
        }
        @keyframes scan {
            0% { transform: translateY(-100%); opacity: 0; }
            50% { opacity: 0.5; }
            100% { transform: translateY(100%); opacity: 0; }
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to right, transparent, #87BDFF, transparent);
            animation: scan 2s linear infinite;
        }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "framer-motion": "https://esm.sh/framer-motion@^11.11.11",
    "html-to-image": "https://esm.sh/html-to-image@^1.11.11"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

</body>
</html>
